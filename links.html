<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enlaces - FerVic Reconstructora</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f7fa;
            font-family: sans-serif;
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(#1a365d 1px, transparent 1px);
            background-size: 20px 20px;
            opacity: 0.1;
            z-index: -1;
            pointer-events: none;
        }

        .contenedor-linktree {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
            min-height: 100vh;
            text-align: center;
        }

        .foto-perfil {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid white;
            margin-bottom: 20px;
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .foto-perfil img {
            width: 80%;
            height: auto;
        }

        .nombre-usuario {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #1a365d;
        }

        .slogan-linktree {
            color: #555;
            font-size: 14px;
            margin-bottom: 40px;
            font-style: italic;
        }

        .lista-links {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .boton-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background-color: #1a365d;
            color: white !important;
            text-decoration: none;
            padding: 18px;
            font-weight: bold;
            border-radius: 8px; 
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .boton-link:hover {
            transform: translateY(-3px);
            background-color: #2a4d7d;
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
        }

        .redes-sociales-iconos {
            margin-top: 50px;
            display: flex;
            gap: 30px;
        }

        .redes-sociales-iconos a {
            text-decoration: none;
            color: #1a365d;
            transition: 0.3s;
            font-size: 30px;
        }

        .redes-sociales-iconos a:hover {
            color: #ff4747;
            transform: scale(1.2);
        }

        .footer-texto {
            margin-top: 60px;
            color: #1a365d;
            font-size: 12px;
            opacity: 0.8;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="grid-overlay"></div>

    <div class="contenedor-linktree">
        <div class="foto-perfil">
            <img src="img/FERVIC.png" alt="FerVic Logo">
        </div>
        
        <h1 class="nombre-usuario">FerVic Reconstructora</h1>
        <p class="slogan-linktree">“Potencia confiable desde el primer giro.”</p>

        <div class="lista-links">
            <a href="index.html" class="boton-link">
                <i class="fas fa-globe"></i> Visita nuestra Web
            </a>

            <a href="https://wa.me/525611719482" target="_blank" class="boton-link">
                <i class="fab fa-whatsapp"></i> Pedidos por WhatsApp
            </a>

            <a href="https://www.facebook.com/share/18Hyxc7uoQ/?mibextid=wwXIfr" target="_blank" class="boton-link">
                <i class="fab fa-facebook-f"></i> Síguenos en Facebook
            </a>

            <a href="https://www.instagram.com/fervic_autopartes/" target="_blank" class="boton-link">
                <i class="fab fa-instagram"></i> Instagram Oficial
            </a>
        </div>

        <div class="redes-sociales-iconos">
            <a href="https://www.facebook.com/share/18Hyxc7uoQ/?mibextid=wwXIfr" target="_blank">
                <i class="fab fa-facebook"></i>
            </a>
            <a href="https://www.instagram.com/fervic_autopartes/" target="_blank">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="mailto:fervicreco@gmail.com">
                <i class="fas fa-envelope"></i>
            </a>
        </div>

        <p class="footer-texto">HECHO POR FERVIC RECONSTRUCTORA © 2026</p>
    </div>
</body>
</html>
