    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        /* Ajustes específicos para el Linktree de FerVic */
        .contenedor-linktree {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh;
            text-align: center;
        }

        .foto-perfil {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid white;
            margin-bottom: 10px;
            object-fit: cover;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 30px;
        }

        .nombre-usuario {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 5px;
            letter-spacing: 1px;
            color: white;
        }

        .slogan-linktree {
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
            font-style: italic;
        }

        .lista-links {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .boton-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background-color: white;
            color: black !important;
            text-decoration: none;
            padding: 16px;
            font-weight: bold;
            border-radius: 50px; 
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 13px;
        }

        .boton-link:hover {
            transform: scale(1.05);
            background-color: #00f7ff; /* Brillo cian al pasar el mouse */
        }

        .redes-sociales-iconos {
            margin-top: 40px;
            display: flex;
            gap: 25px;
        }

        .redes-sociales-iconos a {
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }

        .redes-sociales-iconos span {
            font-size: 32px;
        }

        .redes-sociales-iconos a:hover {
            color: #00f7ff;
        }
    </style>
</head>
